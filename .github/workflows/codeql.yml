name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Wednesday 03:17 UTC — offset to avoid peak load on GitHub infrastructure
    - cron: '17 3 * * 3'

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Extend the default query suite with security-and-quality checks
          queries: security-and-quality

      - name: Build for CodeQL
        run: dotnet build --configuration Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:csharp
